<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Match — Color Match</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #888;
  --faint: #bbb;
  --chip: #f1f1f1;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-pill: 99px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111113;
    --surface: #1c1c1e;
    --border: #2e2e30;
    --text: #f0f0f0;
    --muted: #888;
    --faint: #555;
    --chip: #2a2a2c;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header span { font-size: 13px; color: var(--muted); }

/* Palette Grid */
.palette-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}


/* Search row */
.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.search-row input {
  flex: 1;
  min-width: 0;
  padding: 9px 12px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
}
.search-row input::placeholder { color: var(--faint); }
.search-row input:focus { outline: 2px solid #555; outline-offset: 1px; }

.btn {
  padding: 9px 16px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:active { opacity: 0.7; }

.error {
  font-size: 13px;
  color: #b91c1c;
  margin-top: 8px;
}

.note {
  font-size: 12px;
  color: var(--faint);
  margin-top: 8px;
  font-style: italic;
}

/* Preview */
.preview {
  border-radius: var(--radius-md);
  height: 80px;
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.25s;
}

/* Detail card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.color-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.swatch {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.25s;
}
.color-name { font-size: 16px; font-weight: 600; }
.color-id   { font-size: 12px; color: var(--muted); margin-top: 2px; }
.color-hex  { font-size: 12px; font-family: monospace; color: var(--faint); margin-top: 2px; }
.pantone {
  display: inline-block;
  margin-top: 5px;
  font-size: 11px;
  padding: 3px 9px;
  background: var(--chip);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  color: var(--muted);
}
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
  gap: 8px;
  margin-top: 1rem;
}
.recipe-cell {
  background: var(--chip);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.recipe-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--faint);
}
.recipe-val {
  font-size: 17px;
  font-weight: 600;
  margin-top: 3px;
  color: var(--text);
}
.hint { font-size: 12px; color: var(--faint); margin-top: 10px; }
.empty {
  font-size: 14px;
  color: var(--faint);
  text-align: center;
  padding: 1.5rem 0;
}

/* Scale */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.scale-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.scale-row input {
  width: 100px;
  padding: 9px 12px;
  font-size: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
}
.scale-row input:focus { outline: 2px solid #555; outline-offset: 1px; }
.scale-row .unit { font-size: 13px; color: var(--muted); }
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill {
  font-size: 13px;
  padding: 5px 11px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  color: var(--muted);
  border: 1px solid var(--border);
}
.pill strong { font-weight: 600; color: var(--text); }

/* Signature */
.signature {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.signature a {
  font-size: 12px;
  color: var(--faint);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
.signature a:hover { color: var(--muted); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Match</h1>
    <span>Kit Version</span>
  </div>

  <div class="palette-card">
    <div class="search-row">
      <input type="text" id="searchinp" placeholder="Type a color name (terracotta, sage, coral…)"
        onkeydown="if(event.key==='Enter') matchFromName()" />
      <button class="btn" onclick="matchFromName()">Generate recipe</button>
    </div>
    <div id="searcherr" class="error"></div>
    <p class="note">Colors may vary by paint and surface.</p>
  </div>

  <div id="preview" class="preview"></div>

  <div class="card">
    <div id="empty" class="empty">Tap a color above to see its details.</div>
    <div id="meta" style="display:none">
      <div class="color-row">
        <div id="swatch" class="swatch"></div>
        <div>
          <div id="cname" class="color-name"></div>
          <div id="cid"   class="color-id"></div>
          <div id="chex"  class="color-hex"></div>
          <div id="cpan"></div>
        </div>
      </div>
      <div id="rgrid" class="recipe-grid"></div>
      <p class="hint">Yellow = warmer &nbsp;·&nbsp; Blue = cooler</p>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Scale recipe</div>
    <div class="scale-row">
      <input id="vol" type="number" inputmode="decimal" value="50" min="1" />
      <span class="unit">ml total</span>
      <button class="btn" onclick="doScale()">Scale</button>
    </div>
    <div id="pills" class="pills"></div>
  </div>

  <div class="signature">
    <a href="https://creatis.in/pages/stack" target="_blank" rel="noopener">Built by The Creatis Stack</a>
  </div>

</div>
<script>
const FEVICRYL = [
  {name:"White",         hex:"#ffffff"},
  {name:"Black",         hex:"#000000"},
  {name:"Lemon Yellow",  hex:"#f5e642"},
  {name:"Chrome Yellow", hex:"#f2c400"},
  {name:"Golden Yellow", hex:"#f1b434"},
  {name:"Crimson",       hex:"#c81d25"},
  {name:"Indian Red",    hex:"#b23a2b"},
  {name:"Magenta",       hex:"#d72663"},
  {name:"Prussian Blue", hex:"#1f3a93"},
  {name:"Ultramarine",   hex:"#3f3fbf"},
  {name:"Cerulean Blue", hex:"#2a6fdb"},
  {name:"Sap Green",     hex:"#507d2a"},
  {name:"Leaf Green",    hex:"#6cc24a"},
  {name:"Dark Green",    hex:"#1b5e20"},
  {name:"Orange",        hex:"#f57c00"},
  {name:"Pink",          hex:"#ff4d6d"},
  {name:"Violet",        hex:"#6a4c93"},
  {name:"Turquoise",     hex:"#2ec4b6"}
];

const COLOR_MAP = {
  terracotta:"#E2725B", terracota:"#E2725B", rust:"#B7410E", brick:"#9C3B2E",
  clay:"#B66A50", ceramic:"#C56F4D", coral:"#FF7F50", salmon:"#FA8072",
  blush:"#DE5D83", rose:"#E3266B", dustyrose:"#C08081", sage:"#9CAF88",
  olive:"#808000", moss:"#8A9A5B", forest:"#228B22", teal:"#008080",
  turquoise:"#40E0D0", aqua:"#00FFFF", indigo:"#4B0082", navy:"#000080",
  sky:"#87CEEB", mustard:"#C69C00", ochre:"#CC7722", sand:"#C2B280",
  beige:"#F5F5DC", tan:"#D2B48C", cream:"#FFFDD0", charcoal:"#36454F",
  slate:"#708090", chocolate:"#7B3F00"
};

const LABELS = { y:"Yellow", o:"Orange", r:"Red", b:"Blue" };
let current = null, activeEl = null;

function hexToRgb(hex) {
  const b = parseInt(hex.replace('#',''), 16);
  return { r:(b>>16)&255, g:(b>>8)&255, b:b&255 };
}
function colorDist(a, b) {
  return Math.sqrt((a.r-b.r)**2 + (a.g-b.g)**2 + (a.b-b.b)**2);
}
function mix4(p1,p2,p3,p4,w1,w2,w3,w4) {
  const t = w1+w2+w3+w4;
  return {
    r:(p1.r*w1+p2.r*w2+p3.r*w3+p4.r*w4)/t,
    g:(p1.g*w1+p2.g*w2+p3.g*w3+p4.g*w4)/t,
    b:(p1.b*w1+p2.b*w2+p3.b*w3+p4.b*w4)/t
  };
}

function findBestMix(target) {
  let best = { dist:999999 };
  const ratios = [[50,25,15,10],[40,30,20,10],[45,25,20,10],[35,30,25,10],[30,30,25,15]];
  for (let a=0; a<FEVICRYL.length; a++)
  for (let b=a+1; b<FEVICRYL.length; b++)
  for (let c=b+1; c<FEVICRYL.length; c++)
  for (let d=c+1; d<FEVICRYL.length; d++) {
    const p1=hexToRgb(FEVICRYL[a].hex), p2=hexToRgb(FEVICRYL[b].hex),
          p3=hexToRgb(FEVICRYL[c].hex), p4=hexToRgb(FEVICRYL[d].hex);
    for (const r of ratios) {
      const mix = mix4(p1,p2,p3,p4,...r);
      const dist = colorDist(target, mix);
      if (dist < best.dist) best = { a, b, c, d, dist, ratio:r };
    }
  }
  return best;
}

function showCustom(hex, name, recipeHtml) {
  if (activeEl) { activeEl.classList.remove("selected"); activeEl = null; }
  document.getElementById("preview").style.background = hex;
  document.getElementById("swatch").style.background  = hex;
  document.getElementById("cname").textContent = name || "Custom color";
  document.getElementById("cid").textContent   = "";
  document.getElementById("chex").textContent  = hex.toUpperCase();
  document.getElementById("cpan").innerHTML    = "";
  document.getElementById("rgrid").innerHTML   = recipeHtml ||
    `<div class="recipe-cell"><div class="recipe-label">Note</div><div class="recipe-val" style="font-size:13px">Contact us for recipe</div></div>`;
  document.getElementById("empty").style.display = "none";
  document.getElementById("meta").style.display  = "block";
  document.getElementById("pills").innerHTML = "";
}

function matchFromName() {
  const err = document.getElementById("searcherr");
  err.textContent = "";
  const name = document.getElementById("searchinp").value.trim().toLowerCase().replace(/\s+/g,"");
  if (!name) { err.textContent = "Please enter a color name."; return; }
  if (!COLOR_MAP[name]) {
    err.textContent = "Color not recognized. Try: terracotta, sage, coral, olive, sand, ochre, rust, clay…";
    return;
  }
  const hex = COLOR_MAP[name];
  const rgb = hexToRgb(hex);
  const best = findBestMix(rgb);
  const r = best.ratio;
  const p1=FEVICRYL[best.a], p2=FEVICRYL[best.b], p3=FEVICRYL[best.c], p4=FEVICRYL[best.d];
  const recipeHtml = `
    <div class="recipe-cell"><div class="recipe-label">${p1.name}</div><div class="recipe-val">${r[0]}%</div></div>
    <div class="recipe-cell"><div class="recipe-label">${p2.name}</div><div class="recipe-val">${r[1]}%</div></div>
    <div class="recipe-cell"><div class="recipe-label">${p3.name}</div><div class="recipe-val">${r[2]}%</div></div>
    <div class="recipe-cell"><div class="recipe-label">${p4.name}</div><div class="recipe-val">${r[3]}%</div></div>`;
  const label = name.charAt(0).toUpperCase() + name.slice(1);
  current = { hex, name:label, recipe:null, _fevicryl:{ p1, p2, p3, p4, r } };
  showCustom(hex, label, recipeHtml);
  document.getElementById("cid").textContent = "Fevicryl mix · generated";
}

function doScale() {
  if (!current) return;
  const vol = parseFloat(document.getElementById("vol").value);
  if (isNaN(vol) || vol <= 0) return;
  let html = "";
  if (current._fevicryl) {
    const { p1, p2, p3, p4, r } = current._fevicryl;
    [[p1,r[0]],[p2,r[1]],[p3,r[2]],[p4,r[3]]].forEach(([p,pct]) => {
      html += `<div class="pill">${p.name} <strong>${(vol*pct/100).toFixed(1)} ml</strong></div>`;
    });
  } else if (current.recipe) {
    const f = vol / 100;
    Object.entries(current.recipe).filter(([,v]) => v > 0).forEach(([k,v]) => {
      html += `<div class="pill">${LABELS[k]||k} <strong>${(v*f).toFixed(1)} ml</strong></div>`;
    });
  }
  document.getElementById("pills").innerHTML = html;
}
</script>
</body>
</html>
